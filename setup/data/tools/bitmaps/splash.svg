<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="200" viewBox="0 0 600 200" role="img" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<title>Q3RallyRadiant splash screen</title>
<desc>Q3Rally Radiant – Map Editor, Based on NetRadiant Custom</desc>
<defs>
  <pattern id="checker" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#2a2a2a"/>
    <rect x="8" y="8" width="8" height="8" fill="#2a2a2a"/>
    <rect x="8" y="0" width="8" height="8" fill="#222222"/>
    <rect x="0" y="8" width="8" height="8" fill="#222222"/>
  </pattern>
</defs>

<rect width="600" height="200" fill="url(#checker)"/>
<rect width="600" height="200" fill="#181818" opacity="0.52"/>

<image x="10" y="0" width="220" height="200"
       href="data:image/jpeg;base64,"
       preserveAspectRatio="xMidYMid meet"/>

<line x1="238" y1="20" x2="238" y2="180" stroke="#cc2200" stroke-width="1.5" opacity="0.5"/>

<text x="256" y="52" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900"
      fill="#cc2200" letter-spacing="-1">Q3Rally</text>
<text x="256" y="98" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900"
      fill="#f4f4f4" letter-spacing="-1">Radiant</text>

<rect x="256" y="110" width="250" height="2.5" fill="#cc2200" rx="1"/>

<text x="258" y="132" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400"
      fill="#cccccc" letter-spacing="0.8">Map Editor</text>
<text x="258" y="154" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400"
      fill="#777777" letter-spacing="0.3">Based on NetRadiant Custom</text>
</svg>