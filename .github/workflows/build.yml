name: build

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  windows-msys:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]
        include:
          - arch: x86_64
            msystem: MINGW64
            prefix: mingw-w64-x86_64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          install: >-
            base-devel
            ${{ matrix.prefix }}-toolchain
            ${{ matrix.prefix }}-qt5-base
            ${{ matrix.prefix }}-qt5-svg
            ${{ matrix.prefix }}-assimp
            ${{ matrix.prefix }}-libxml2
            git
            unzip
            p7zip
          msystem: ${{ matrix.msystem }}
          path-type: minimal
          release: false
          update: false

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          make MAKEFILE_CONF=msys2-Makefile.conf -j4
          mkdir -p install/settings
          7z a netradiant-custom-windows-${{ matrix.arch }}.zip ./install/*

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: netradiant-custom-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
      - name: Install tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install \
            mesa-common-dev \
            qtbase5-dev \
            libqt5svg5-dev \
            libglib2.0-dev \
            libjpeg-dev \
            libpng-dev \
            libassimp-dev \
            p7zip-full

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          make CC=gcc-14 CXX=g++-14 CXXFLAGS="-Wno-deprecated-copy" -j4
          ./appimage.sh
          7z a netradiant-custom-linux-${{ matrix.arch }}.7z ./NetRadiant-Custom-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: netradiant-custom-linux-${{ matrix.arch }}.7z
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          brew update
          brew install qt@5 assimp p7zip

      - name: Set up Qt environment
        run: |
          echo "QT5_DIR=$(brew --prefix qt@5)" >> $GITHUB_ENV
          echo "$(brew --prefix qt@5)/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          export PATH="$QT5_DIR/bin:$PATH"
          export CPPFLAGS="-I$QT5_DIR/include"
          export LDFLAGS="-L$QT5_DIR/lib"
          make -j4
          mkdir -p dist
          # Falls dein Build bereits ein .app oder ein install/-Verzeichnis erzeugt,
          # passe die nächsten Zeilen ggf. an.
          if [ -d "install" ]; then
            ditto -c -k --sequesterRsrc --keepParent install dist/netradiant-custom-macos-${{ matrix.arch }}.zip
          elif ls *.app >/dev/null 2>&1; then
            APP_NAME="$(ls -d *.app | head -n 1)"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "dist/netradiant-custom-macos-${{ matrix.arch }}.zip"
          else
            echo "Kein macOS-Ausgabeordner gefunden (weder install noch *.app)."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/netradiant-custom-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  create-release:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    name: Create dated release
    needs: [windows-msys, linux, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release metadata
        run: |
          echo "RELEASE_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "RELEASE_TAG=build-$(date +'%Y%m%d')-${{ github.run_number }}" >> $GITHUB_ENV
          echo "RELEASE_TITLE=Build $(date +'%Y-%m-%d') #${{ github.run_number }}" >> $GITHUB_ENV

      - name: Move files into release directory
        run: |
          mkdir -p release-files
          find . -type f \( -name "*.zip" -o -name "*.7z" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            release-files/* \
            --title "$RELEASE_TITLE" \
            --notes "Automated build from workflow run ${{ github.run_number }} on $(date +'%Y-%m-%d')."
            
