name: build

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  windows-msys:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]
        include:
          - arch: x86_64
            msystem: MINGW64
            prefix: mingw-w64-x86_64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          install: >-
            base-devel
            ${{ matrix.prefix }}-toolchain
            ${{ matrix.prefix }}-qt5-base
            ${{ matrix.prefix }}-qt5-svg
            ${{ matrix.prefix }}-assimp
            ${{ matrix.prefix }}-libxml2
            git
            unzip
            p7zip
          msystem: ${{ matrix.msystem }}
          path-type: minimal
          release: false
          update: false

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          make MAKEFILE_CONF=msys2-Makefile.conf -j4
          mkdir -p install/settings
          7z a netradiant-custom-windows-${{ matrix.arch }}.zip ./install/*

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: netradiant-custom-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
      - name: Install tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install \
            mesa-common-dev \
            libgl-dev \
            libglx-dev \
            libx11-dev \
            qtbase5-dev \
            libqt5svg5-dev \
            libglib2.0-dev \
            libjpeg8-dev \
            libpng-dev \
            libxml2-dev \
            libassimp-dev \
            zlib1g-dev \
            p7zip-full \
            unzip \
            wget \
            git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          make CC=gcc-14 CXX=g++-14 CXXFLAGS="-Wno-deprecated-copy" -j4
          ./appimage.sh
          7z a netradiant-custom-linux-${{ matrix.arch }}.7z ./NetRadiant-Custom-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: netradiant-custom-linux-${{ matrix.arch }}.7z
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-13

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          brew update
          brew install qt@5 assimp jpeg-turbo p7zip pkg-config

      - name: Set up build environment
        run: |
          echo "HOMEBREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          echo "QT5_DIR=$(brew --prefix qt@5)" >> $GITHUB_ENV
          echo "ASSIMP_DIR=$(brew --prefix assimp)" >> $GITHUB_ENV
          echo "JPEG_DIR=$(brew --prefix jpeg-turbo)" >> $GITHUB_ENV
          echo "$(brew --prefix qt@5)/bin" >> $GITHUB_PATH

      - name: Verify Qt5 architecture
        run: |
          file "$QT5_DIR/lib/libQt5Core.dylib"
          lipo -info "$QT5_DIR/lib/libQt5Core.dylib"
          lipo -archs "$QT5_DIR/lib/libQt5Core.dylib" | tr ' ' '\n' | grep -x "${{ matrix.arch }}"

      - name: Build
        run: |
          export PATH="$QT5_DIR/bin:$PATH"
          export ARCHFLAGS="-arch ${{ matrix.arch }}"
          export PKG_CONFIG_PATH="$QT5_DIR/lib/pkgconfig:$ASSIMP_DIR/lib/pkgconfig:$JPEG_DIR/lib/pkgconfig:$HOMEBREW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export CPPFLAGS="-I$QT5_DIR/include -I$ASSIMP_DIR/include -I$JPEG_DIR/include $ARCHFLAGS $CPPFLAGS"
          export LDFLAGS="-L$QT5_DIR/lib -L$ASSIMP_DIR/lib -L$JPEG_DIR/lib $ARCHFLAGS $LDFLAGS"
          # Fix: macOS hat kein <GL/gl.h>, nur <OpenGL/gl.h> — Symlink als Shim anlegen
          sudo mkdir -p /usr/local/include/GL
          sudo ln -sf "$(xcrun --show-sdk-path)/System/Library/Frameworks/OpenGL.framework/Headers/gl.h" /usr/local/include/GL/gl.h
          export CFLAGS="-DGL_SILENCE_DEPRECATION $ARCHFLAGS $CFLAGS"
          export CXXFLAGS="-DGL_SILENCE_DEPRECATION $ARCHFLAGS $CXXFLAGS"
          make DEPENDENCIES_CHECK=off -j4

      - name: Package macOS build
        run: |
          mkdir -p dist
          if [ -d "install" ]; then
            ditto -c -k --sequesterRsrc --keepParent install dist/netradiant-custom-macos-${{ matrix.arch }}.zip
          elif ls *.app >/dev/null 2>&1; then
            APP_NAME="$(ls -d *.app | head -n 1)"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" dist/netradiant-custom-macos-${{ matrix.arch }}.zip
          else
            echo "Kein macOS-Ausgabeordner gefunden (weder install noch *.app)."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/netradiant-custom-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  create-release:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    name: Create dated release
    needs: [windows-msys, linux, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release metadata
        run: |
          echo "RELEASE_TAG=build-$(date +'%Y%m%d')-${{ github.run_number }}" >> $GITHUB_ENV
          echo "RELEASE_TITLE=Build $(date +'%Y-%m-%d') #${{ github.run_number }}" >> $GITHUB_ENV

      - name: Collect release files
        run: |
          mkdir -p release-files
          find . -type f \( -name "*.zip" -o -name "*.7z" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            release-files/* \
            --title "$RELEASE_TITLE" \
            --notes "Automated build from workflow run ${{ github.run_number }} on $(date +'%Y-%m-%d')."
