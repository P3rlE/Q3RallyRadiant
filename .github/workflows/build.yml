name: build

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  windows-msys:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]
        include:
          - arch: x86_64
            msystem: MINGW64
            prefix: mingw-w64-x86_64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@v2
        with:
          install: >-
            base-devel
            ${{ matrix.prefix }}-toolchain
            ${{ matrix.prefix }}-qt5-base
            ${{ matrix.prefix }}-qt5-svg
            ${{ matrix.prefix }}-assimp
            ${{ matrix.prefix }}-libxml2
            git
            unzip
            p7zip
          msystem: ${{ matrix.msystem }}
          path-type: minimal
          release: false
          update: false

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build
        run: |
          make MAKEFILE_CONF=msys2-Makefile.conf -j4
          mkdir -p install/settings
          mkdir -p install/gamepacks
          cp -r tools/gamepack/. install/gamepacks/
          7z a q3rallyradiant-windows-${{ matrix.arch }}.zip ./install/*

      - uses: actions/upload-artifact@v6
        with:
          name: q3rallyradiant-windows-${{ matrix.arch }}
          path: q3rallyradiant-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    steps:
      - name: Install tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -y install \
            mesa-common-dev \
            libgl-dev \
            libglx-dev \
            libx11-dev \
            qtbase5-dev \
            libqt5svg5-dev \
            libglib2.0-dev \
            libjpeg8-dev \
            libpng-dev \
            libxml2-dev \
            libassimp-dev \
            zlib1g-dev \
            p7zip-full \
            unzip \
            wget \
            git

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Generate Q3Rally splash
        run: |
          pip install cairosvg --quiet --break-system-packages 2>/dev/null || pip install cairosvg --quiet
          python3 tools/make_splash.py

      - name: Build
        run: |
          set -euxo pipefail
          make CC=gcc-14 CXX=g++-14 CXXFLAGS="-Wno-deprecated-copy" -j4
          mkdir -p install/gamepacks
          cp -r tools/gamepack/. install/gamepacks/
          chmod +x ./appimage.sh
          ./appimage.sh || { echo "AppImage generation failed"; exit 1; }

          VERSION_NUMBER="$(sed -n 's/^RADIANT_VERSION_NUMBER[[:space:]]*[?]?=[[:space:]]*//p' Makefile | head -n1)"
          APPIMAGE_PATH="./q3rallyradiant-${VERSION_NUMBER}-x86_64.AppImage"

          if [ ! -f "${APPIMAGE_PATH}" ]; then
            echo "Error: AppImage file was not created at ${APPIMAGE_PATH}"
            echo "Current directory contents:"
            ls -la
            echo "Known AppImage candidates:"
            find . -maxdepth 1 -type f -name '*.AppImage' -print || true
            exit 1
          fi

          7z a q3rallyradiant-linux-${{ matrix.arch }}.7z "${APPIMAGE_PATH}"

      - uses: actions/upload-artifact@v6
        with:
          name: q3rallyradiant-linux-${{ matrix.arch }}
          path: q3rallyradiant-linux-${{ matrix.arch }}.7z
          if-no-files-found: error

  create-release:
    if: github.ref == 'refs/heads/master' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    name: Create dated release
    needs: [windows-msys, linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Prepare release metadata
        run: |
          echo "RELEASE_TAG=build-$(date +'%Y%m%d')-${{ github.run_number }}" >> $GITHUB_ENV
          echo "RELEASE_TITLE=Build $(date +'%Y-%m-%d') #${{ github.run_number }}" >> $GITHUB_ENV

      - name: Collect release files
        run: |
          mkdir -p release-files
          find . -type f \( -name "*.zip" -o -name "*.7z" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            release-files/* \
            --repo "${{ github.repository }}" \
            --title "$RELEASE_TITLE" \
            --notes "Automated build from workflow run ${{ github.run_number }} on $(date +'%Y-%m-%d')."

